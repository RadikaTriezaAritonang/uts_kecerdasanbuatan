<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Analisis Kelayakan Pinjaman</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 40px 0; }
        .card { border-radius: 15px; border: none; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header-expert { background: #1a237e; color: white; padding: 20px; border-radius: 15px 15px 0 0; text-align: center; }
        #resultBox { display: none; margin-top: 20px; padding: 20px; border-radius: 10px; color: white; text-align: center; }
        .form-label { font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="header-expert">
                    <h4>Sistem Analisis Kelayakan Pinjaman</h4>
                </div>
                <div class="card-body p-4">
                    <form id="expertForm">
                        <div class="mb-3">
                            <label class="form-label">1. Pekerjaan</label>
                            <select id="fakta1" class="form-select" required>
                                <option value="" disabled selected>Pilih Pekerjaan...</option>
                                <option value="5">Karyawan Tetap / PNS</option>
                                <option value="4">Pengusaha</option>
                                <option value="3">Karyawan Kontrak</option>
                                <option value="2">Freelance</option>
                                <option value="1">Pekerja Tidak Tetap</option>
                                <option value="0">Tidak Bekerja</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">2. Penghasilan Per Bulan</label>
                            <input type="number" id="fakta2" class="form-control" placeholder="Rp" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">3. Tagihan Listrik & Air</label>
                            <input type="number" id="fakta3" class="form-control" placeholder="Rp" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">4. Jaminan Aset</label>
                            <select id="fakta4" class="form-select" required>
                                <option value="" disabled selected>Pilih Aset...</option>
                                <option value="5">Tanah > 1,5 Hektar</option>
                                <option value="3">Mobil / Rumah</option>
                                <option value="1">Motor / Elektronik</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">5. Jumlah Tanggungan</label>
                            <input type="number" id="fakta5" class="form-control" placeholder="Jumlah Orang" required>
                        </div>

                        <button type="button" onclick="mulaiInferensi()" class="btn btn-primary w-100 fw-bold">JALANKAN INFERENSI</button>
                    </form>

                    <div id="resultBox">
                        <h6 id="statusLabel">HASIL KESIMPULAN:</h6>
                        <h2 id="kategoriOutput">---</h2>
                        <hr>
                        <p id="skorDetail" class="mb-0"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function mulaiInferensi() {
    const form = document.getElementById('expertForm');
    if (!form.checkValidity()) {
        alert("Sistem membutuhkan semua fakta (data) untuk mencapai kesimpulan.");
        return;
    }

    const f1 = parseInt(document.getElementById('fakta1').value);
    const gaji = parseFloat(document.getElementById('fakta2').value);
    const utilitas = parseFloat(document.getElementById('fakta3').value);
    const f4 = parseInt(document.getElementById('fakta4').value);
    const tanggungan = parseInt(document.getElementById('fakta5').value);

    let f2 = (gaji >= 10000000) ? 5 : (gaji >= 5000000 ? 3 : 1);
    let rasio = utilitas / (gaji || 1);
    let f3 = (rasio <= 0.1) ? 5 : (rasio <= 0.3 ? 3 : 1);
    let f5 = (tanggungan <= 1) ? 5 : (tanggungan <= 3 ? 3 : 1);

    const totalSkor = f1 + f2 + f3 + f4 + f5;
    
    let kategori = "";
    let warna = "";

    if (totalSkor >= 21) {
        kategori = "SANGAT LAYAK";
        warna = "#2ecc71";
    } else if (totalSkor >= 13) {
        kategori = "LAYAK";
        warna = "#3498db";
    } else {
        kategori = "TIDAK LAYAK";
        warna = "#e74c3c";
    }

    // UPDATE UI
    const resBox = document.getElementById('resultBox');
    resBox.style.display = "block";
    resBox.style.backgroundColor = warna;
    document.getElementById('kategoriOutput').innerText = kategori;
    document.getElementById('skorDetail').innerText = "Total Akumulasi Skor: " + totalSkor + " / 25";
}
</script>

</body>
</html>
